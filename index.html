
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEDIL OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-app: #000000;
      }
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed; /* Prevents scroll bounce and shifting */
        overscroll-behavior: none;
        touch-action: none; /* Disables standard touch gestures like pinch-zoom */
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-app);
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* MacOS Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      input:focus {
        outline: none;
      }
      
      /* Glassmorphism utilities */
      .glass {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .glass-dark {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      /* Chat Fade Mask */
      .mask-fade-top {
        mask-image: linear-gradient(to bottom, transparent, black 20px);
        -webkit-mask-image: linear-gradient(to bottom, transparent, black 20px);
      }

      /* 3D Utilities */
      .perspective-\[1200px\] {
        perspective: 1200px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              macos: {
                blue: '#007AFF',
                gray: '#8E8E93',
                bg: '#F5F5F7',
                window: '#FFFFFF',
              },
              outlook: {
                blue: '#0f6cbd',
                hover: '#f0f0f0',
                selected: '#cce3f5',
              }
            },
            boxShadow: {
              'macos-window': '0 20px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1)',
              'macos-dock': '0 4px 20px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255,255,255,0.1)',
            }
          }
        }
      }
    </script>

    "zustand/": "https://aistudiocdn.com/zustand@^5.0.8/"
  }
}
</script>
